<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open Source Licenses</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/mustache@4.2.0/mustache.min.js"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #e5e7eb;
        }

        .table-cell {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            border-bottom: 1px solid #e5e7eb;
            width: 100%;
            cursor: pointer;
            box-sizing: border-box;
            background-color: #f3f4f6;
        }

        .table-cell:hover {
            background-color: #f1f5f9;
        }

        .arrow {
            margin-left: auto;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            color: #9ca3af;
            flex-shrink: 0;
            width: 20px;
        }

        .back-button {
            display: flex;
            align-items: center;
            font-size: 14px;
            color: #3b82f6;
            background: transparent;
            border: none;
            cursor: pointer;
            padding: 4px 8px;
            transition: color 0.2s;
        }

        .back-button:hover {
            color: #2563eb;
        }

        .back-button svg {
            margin-right: 4px;
        }

        #repoLink {
         display: block;
         margin-top: 40px;
        }

        #licenseText {
         font-size: 10px;
        }
    </style>
</head>

<body class="bg-gray-100 text-gray-800">

    <!-- Repositories List Section -->
    <div id="repoList" class="section active p-4 max-w-2xl mx-auto mt-10 bg-white rounded-lg shadow-md">
        <h2 class="text-2xl font-bold mb-4 text-gray-700">Open Source Licenses</h2>
        <ul id="repoListContent" class="flex flex-col w-full">
            <!-- List items will be inserted here -->
        </ul>
    </div>

    <!-- License Section -->
    <div id="licenseSection" class="section license-section fixed inset-0 bg-white p-6 hidden overflow-y-auto">
        <button class="back-button" onclick="onBackPressed()">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
            </svg>
            Back
        </button>
        <a id="repoLink" href="#" class="text-blue-600 hover:underline hidden"></a>
        <pre id="licenseText" class="text-sm whitespace-pre-wrap text-gray-800 mt-4"></pre>
    </div>

    <!-- Templates -->
    <script id="repo-template" type="x-tmpl-mustache">
        {{#repositories}}
        <li class="table-cell w-full" onclick="showLicense('{{name}}')">
            <span class="text-gray-700 flex-grow">{{name}}</span>
            <span class="arrow">➔</span>
        </li>
        {{/repositories}}
    </script>

        `;

        // Parse the JSON string to get the repositories array
        const repositories = JSON.parse(repositoriesJson, (key, value) =>
            typeof value === "string" ? value.replace(/\\n/g, "\n").replace(/\\\//g, "/") : value
        );

        // Render the repository list using Mustache
        function renderRepoList() {
            const template = document.getElementById('repo-template').innerHTML;
            const rendered = Mustache.render(template, { repositories });
            document.getElementById('repoListContent').innerHTML = rendered;
        }

        // Show license section with the relevant text
        function showLicense(repoName) {
            history.pushState("showLicense", "")
            const repo = repositories.find(r => r.name === repoName);
            document.getElementById('repoList').classList.add('hidden');
            document.getElementById('licenseSection').classList.remove('hidden');
            document.getElementById('licenseText').textContent = repo.license;

            // Show or hide the link with the repository name based on URL presence
            const repoLink = document.getElementById('repoLink');
            if (repo.url) {
                repoLink.classList.remove('hidden');
                repoLink.href = repo.url;
                repoLink.textContent = repo.name;
            } else {
                repoLink.classList.add('hidden');
                repoLink.href = '#';
                repoLink.textContent = '';
            }
        }

      // Pop back state (to support app back navigation)
      function onBackPressed() {
          history.back()
      }

      // For now, the only situation in which we can pop state is when returning to show the repository list
      window.addEventListener("popstate", (event) => {
          showRepoList()
      });

      // Show repository list section
      function showRepoList() {
            document.getElementById('licenseSection').classList.add('hidden');
            document.getElementById('repoList').classList.remove('hidden');
        }

        // Initial render
        renderRepoList();
    </script>
